<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>金融機関情報申請フォーム</title>
<style>
  :root{
    --color-bg:#ffffff;
    --color-black:#1a1a1a;
    --color-gray-900:#1a1a1a;
    --color-gray-600:#6b6b6b;
    --color-gray-300:#d9d9d9;
    --color-gray-100:#f5f5f5;
    --color-accent:#1F3A5C;      /* ネイビー系アクセントカラー */
    --color-accent-light:#2C5AA0;
    --color-error:#c0392b;
    --font: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", -apple-system, BlinkMacSystemFont, sans-serif;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0;
    background:var(--color-bg);
    color:var(--color-black);
    font-family:var(--font);
    -webkit-font-smoothing:antialiased;
    height:100%;
    overflow:hidden; /* ページ全体はスクロールさせず、必要な箇所だけ内部スクロールさせる */
  }

  .app{
    max-width:480px;
    margin:0 auto;
    height:100vh;
    height:100dvh; /* スマホのアドレスバー等を考慮した実際の表示高さ */
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;
  }

  /* ヘッダー */
  .app-header{
    padding:14px 24px;
    border-bottom:1px solid var(--color-gray-300);
    flex-shrink:0;
  }
  .brand{
    font-size:13px;
    letter-spacing:0.08em;
    color:var(--color-gray-600);
  }
  .brand strong{
    color:var(--color-accent);
  }

  /* メインエリア */
  .stage{
    flex:1;
    position:relative;
    overflow:hidden;
  }

  .screen{
    position:absolute;
    inset:0;
    padding:20px 24px 0;
    display:flex;
    flex-direction:column;
    opacity:0;
    transform:translateX(24px);
    pointer-events:none;
    transition:opacity 0.28s ease, transform 0.28s ease;
    overflow:hidden;
  }
  .screen.active{
    opacity:1;
    transform:translateX(0);
    pointer-events:auto;
  }
  .screen.leaving-back{
    transform:translateX(-24px);
  }

  .q-label{
    font-size:21px;
    font-weight:700;
    line-height:1.6;
    margin:0 0 6px;
  }
  .q-required{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    color:#fff;
    background:var(--color-accent);
    padding:2px 8px;
    border-radius:3px;
    margin-left:8px;
    vertical-align:middle;
  }
  .q-optional{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    color:var(--color-gray-600);
    background:var(--color-gray-100);
    padding:2px 8px;
    border-radius:3px;
    margin-left:8px;
    vertical-align:middle;
  }

  .q-desc{
    font-size:14px;
    color:var(--color-gray-600);
    line-height:1.7;
    margin:14px 0 0;
  }

  .q-body{
    flex:1;
    min-height:0;      /* flexコンテナ内でoverflow-yを機能させるために必須 */
    overflow-y:auto;
    padding-bottom:16px;
  }

  input[type="text"], input[type="email"], input[type="tel"], input[type="date"]{
    width:100%;
    font-size:17px;
    font-family:var(--font);
    padding:14px 16px;
    border:1.5px solid var(--color-gray-300);
    border-radius:10px;
    outline:none;
    background:transparent;
    color:var(--color-black);
    transition:border-color 0.2s ease;
  }
  input:focus{
    border-color:var(--color-accent);
  }
  input.error{
    border-color:var(--color-error);
  }

  .error-msg{
    font-size:13px;
    color:var(--color-error);
    margin-top:8px;
    min-height:16px;
  }

  /* 銀行名オートコンプリートの候補リスト */
  .bank-suggestions{
    margin-top:8px;
    border:1.5px solid var(--color-gray-300);
    border-radius:10px;
    overflow:hidden;
  }
  .bank-suggestion-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 14px;
    cursor:pointer;
    border-bottom:1px solid var(--color-gray-100);
    transition:background 0.12s ease;
  }
  .bank-suggestion-item:last-child{
    border-bottom:none;
  }
  .bank-suggestion-item:hover{
    background:#F0F4F9;
  }
  .bank-suggestion-name{
    font-size:14px;
  }
  .bank-suggestion-code{
    font-size:12px;
    color:var(--color-gray-600);
  }
  .bank-link-hint{
    font-size:12px;
    color:var(--color-gray-600);
    margin-top:8px;
    line-height:1.6;
  }

  .address-sublabel{
    display:block;
    font-size:12px;
    font-weight:600;
    color:var(--color-gray-600);
    margin-bottom:6px;
  }
  .address-sublabel-second{
    margin-top:18px;
  }

  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .option{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 16px;
    border:1.5px solid var(--color-gray-300);
    border-radius:10px;
    cursor:pointer;
    transition:border-color 0.15s ease, background 0.15s ease;
  }
  .option:hover{
    border-color:var(--color-accent-light);
  }
  .option.selected{
    border-color:var(--color-accent);
    background:#F0F4F9;
  }
  .option .dot{
    width:18px; height:18px;
    border-radius:50%;
    border:2px solid var(--color-gray-300);
    flex-shrink:0;
    position:relative;
  }
  .option.selected .dot{
    border-color:var(--color-accent);
  }
  .option.selected .dot::after{
    content:"";
    position:absolute;
    inset:3px;
    border-radius:50%;
    background:var(--color-accent);
  }
  .option .option-text{
    font-size:15px;
  }
  .option input{ display:none; }

  /* フッター（次へ／戻る） */
  .footer{
    padding:12px 24px calc(16px + env(safe-area-inset-bottom, 0px));
    display:flex;
    gap:10px;
    border-top:1px solid var(--color-gray-300);
    flex-shrink:0;
  }
  .btn{
    flex:1;
    font-family:var(--font);
    font-size:15px;
    font-weight:700;
    padding:15px 16px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    transition:opacity 0.15s ease, background 0.15s ease;
  }
  .btn-primary{
    background:var(--color-accent);
    color:#fff;
  }
  .btn-primary:hover{ background:var(--color-accent-light); }
  .btn-secondary{
    background:var(--color-gray-100);
    color:var(--color-black);
    flex:0 0 96px;
  }
  .btn-secondary:hover{ background:var(--color-gray-300); }
  .btn:disabled{
    opacity:0.4;
    cursor:not-allowed;
  }

  /* 確認画面 */
  .confirm-title{
    font-size:21px;
    font-weight:700;
    margin:0 0 6px;
  }
  .confirm-desc{
    font-size:14px;
    color:var(--color-gray-600);
    margin:0 0 24px;
  }
  .confirm-list{
    display:flex;
    flex-direction:column;
    gap:0;
  }
  .confirm-item{
    padding:16px 0;
    border-bottom:1px solid var(--color-gray-300);
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
  }
  .confirm-item-main{ flex:1; min-width:0; }
  .confirm-item-label{
    font-size:12px;
    color:var(--color-gray-600);
    margin-bottom:4px;
  }
  .confirm-item-value{
    font-size:15px;
    font-weight:600;
    word-break:break-all;
  }
  .confirm-item-value.empty{
    color:var(--color-gray-600);
    font-weight:400;
  }
  .confirm-edit{
    font-size:13px;
    color:var(--color-accent);
    font-weight:600;
    background:none;
    border:none;
    cursor:pointer;
    padding:4px 0;
    flex-shrink:0;
  }

  /* サンクス画面 */
  .thanks-screen{
    padding-bottom:0;
  }
  .thanks-body{
    flex:1;
    min-height:0;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
  }
  .thanks-mark{
    width:64px; height:64px;
    border-radius:50%;
    background:var(--color-accent);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 24px;
  }
  .thanks-mark svg{ width:28px; height:28px; }
  .thanks-title{
    font-size:22px;
    font-weight:700;
    margin:0 0 12px;
  }
  .thanks-desc{
    font-size:14px;
    color:var(--color-gray-600);
    line-height:1.8;
  }
  .close-hint{
    font-size:12px;
    color:var(--color-gray-600);
    margin-top:18px;
  }
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="brand" id="brandText">お申し込みフォーム</div>
  </div>

  <div class="stage" id="stage"></div>
</div>

<script>
/* ============================================================================
   ▼▼▼ フォーム全体の名前などはここを書き換えてください ▼▼▼
   ----------------------------------------------------------------------------
   ・下の「ラベル：値」の値の部分だけを書き換えてください。
   ・改行を含めたい場合は、その行に <br> と書くと、その位置で改行されます。
   ・「案内文」は、フォームを開いて最初に表示される説明画面の文章です。
     この画面には「同意ボタンの文言」で指定したボタンのみが表示され、
     押すと1問目の質問に進みます。
   ============================================================================ */
const FORM_SETTINGS_TEXT = `
フォームの見出し：金融機関情報申請フォーム
ブラウザのタブに表示する名前：金融機関情報申請フォーム
案内文：SSL/TLSによる暗号化通信を採用し、お客様の個人情報は金融機関へ安全に送信されます。<br>金融機関以外の第三者が内容を閲覧することはできません。
同意ボタンの文言：同意する
送信完了メッセージのタイトル：申請の受付を完了しました。
送信完了メッセージの本文：申請の受付を完了しました。<br>完了ボタンをタップして終了してください。
完了ボタンの文言：完了
タブが閉じない場合の案内文：このタブを直接閉じてください。
送信後の移動先URL：https://www.bk.mufg.jp/index.html
`;
/* ↑「送信後の移動先URL」は必ず https://～ の形式で入力してください（必須）。
   入力すると、送信完了画面の「完了」ボタンを押した瞬間にそのURLへ移動します。
   また、ボタンを押さなくても5秒後に自動的に同じURLへ移動します。
   空欄のままにしておくと、「完了」ボタンを押しても何も起きません
   （画面はその場に留まったままになります）。 */

function parseSettingsText(text){
  const settings = {};
  text.split("\n").forEach(rawLine => {
    const line = rawLine.trim();
    if (!line) return;
    const sep = line.includes("：") ? "：" : (line.includes(":") ? ":" : null);
    if (!sep) return;
    const sepIndex = line.indexOf(sep);
    const key = line.slice(0, sepIndex).trim();
    const value = line.slice(sepIndex + 1).trim();
    settings[key] = value;
  });
  return {
    formTitle: settings["フォームの見出し"] || "金融機関情報申請フォーム",
    tabTitle: settings["ブラウザのタブに表示する名前"] || "金融機関情報申請フォーム",
    introText: settings["案内文"] || "SSL/TLSによる暗号化通信を採用し、お客様の個人情報は金融機関へ安全に送信されます。<br>金融機関以外の第三者が内容を閲覧することはできません。",
    agreeButtonLabel: settings["同意ボタンの文言"] || "同意する",
    thanksTitle: settings["送信完了メッセージのタイトル"] || "申請の受付を完了しました。",
    thanksDesc: settings["送信完了メッセージの本文"] || "申請の受付を完了しました。<br>完了ボタンをタップして終了してください。",
    closeButtonLabel: settings["完了ボタンの文言"] || "完了",
    closeHint: settings["タブが閉じない場合の案内文"] || "このタブを閉じてください。",
    redirectUrl: settings["送信後の移動先URL"] || "https://www.bk.mufg.jp/index.html",
  };
}

const FORM_SETTINGS = parseSettingsText(FORM_SETTINGS_TEXT);
document.title = FORM_SETTINGS.tabTitle;
document.getElementById("brandText").textContent = FORM_SETTINGS.formTitle;

/* ============================================================================
   ▼▼▼ アンケート内容はここを書き換えてください（プログラムの知識は不要です）▼▼▼
   ----------------------------------------------------------------------------
   ・1つの質問は「===」の行で区切ります。
   ・各行は「ラベル：値」の形式で書きます（：は全角のコロンです）。
   ・質問を増やしたいときは、質問1つ分のブロック（=== から次の === の手前まで）
     をまるごとコピーして、末尾に貼り付け、内容を書き換えてください。
   ・質問を減らしたいときは、そのブロックを丸ごと削除してください。
   ・上から順番に、回答画面にもその順番で表示されます。
   ・「質問文」には何を書いても構いません（例：ご趣味、お好きな食べ物、など自由です）。
     「種類」はその質問の“入力欄の見た目とチェック方法”を決めるためのもので、
     下の「使える種類」の中から選んで書く必要があります（自由な文字列は使えません）。

   【使えるラベル】
     質問文     … 画面に表示される質問のタイトル（必須・自由に書けます）
     説明文     … 質問の下に表示する補足説明（省略すると表示なし）
     種類       … 下の「使える種類」から1つ選んで書く（必須）
     必須       … 「はい」または「いいえ」（省略すると「いいえ」扱い）
     文字数上限 … どの種類でも使える。数字のみ（省略可）
     入力制限   … 「種類：短い文章」のときだけ使える。下の3つから選ぶ（省略可）
                  「半角数字のみ」「半角英数字のみ」「全角文字のみ」
     選択肢1    … 「種類：選択式」のときだけ使う。選べる数だけ
     選択肢2      「選択肢3」「選択肢4」…と行を増やせる
     選択肢3

   【使える種類と、それぞれの入力チェック内容】
     氏名           … 名前の入力欄（文字種の制限なし）
     住所           … 郵便番号欄と住所欄がセットで表示される。郵便番号を7桁入力すると
                      都道府県〜町域名まで自動入力され、続けて番地・建物名を
                      入力できる（日本郵便のデータを無料公開しているzipcloudを使用）。
                      必須の質問にすると、郵便番号・住所の両方が入力必須になる
     電話番号       … 半角数字のみ。ハイフンは使えません（例：09012345678）
     メールアドレス … 「◯◯@◯◯.◯◯」のメール形式かどうかを自動チェック
     日付           … 日付の入力欄（カレンダー選択）
     選択式         … 選択肢の中から1つ選ぶ形式（ラジオボタン）
     短い文章       … 自由に1行で記入する形式。「入力制限」「文字数上限」を
                      組み合わせて文字種・文字数を制限できる
                      （例：ご趣味、お好きな食べ物、ご意見など）
     銀行名         … 銀行名の入力欄。「三菱」など一部を入力すると、
                      「三菱UFJ銀行」のように候補が下に表示され、タップで入力できる
                      （日本国内の全金融機関データを外部の無料サービスから取得して使用）
     支店名         … 支店名の入力欄。この質問より前にある「銀行名」の質問で
                      候補から銀行を選んでいると、その銀行の支店だけが
                      候補として絞り込まれて表示される（例：「東京」→「東京営業部」）。
                      前に銀行名の質問が無い、またはまだ銀行が選ばれていない場合は
                      その旨が表示され、候補なしで自由入力になる
     口座種別       … 「普通」「当座」の2択があらかじめ用意された選択式
                      （選択肢を書く必要はありません）
     口座番号       … 半角数字ちょうど7桁のみ（例：0123456）。日本国内の銀行の
                      口座番号は7桁が標準のため、7桁に満たない場合は先頭に0を
                      補って入力してもらう形式です（多くの銀行サイトと同じ方式）
   ============================================================================ */
const QUESTIONS_TEXT = `
===
質問文：お振込先の金融機関名
説明文：金融機関名の一部を入力すると候補が表示されます（例：「三菱」→「三菱UFJ銀行」）。
種類：銀行名
必須：はい
===
質問文：お振込先の支店名
説明文：支店名の一部を入力すると候補が表示されます（例：「東京」→「東京営業部」）。
種類：支店名
必須：はい
===
質問文：口座種別
種類：口座種別
必須：はい
===
質問文：口座番号
説明文：半角数字7桁でご入力ください（例：0123456）。7桁に満たない場合は先頭に0を補ってください。
種類：口座番号
必須：はい
===
質問文：氏名（漢字）
説明文：フルネームでご入力ください。
種類：氏名
必須：はい
===
質問文：氏名（カナ）
説明文：フルネームでご入力ください。
種類：氏名
必須：はい
===
質問文：ご住所
説明文：郵便番号を入力すると住所が自動入力されます。続けて番地・建物名をご入力ください。
種類：住所
必須：はい
===
質問文：電話番号
説明文：半角数字でご入力ください。
種類：電話番号
必須：はい
===
`;

/* ----------------------------------------------------------------------------
   ▲▲▲ 編集はここまで。この下はプログラムなので基本的に触らなくてOKです ▲▲▲
   ---------------------------------------------------------------------------- */

// 「種類：〇〇」の日本語表記 → 内部処理用の種別への対応表
const TYPE_MAP = {
  "氏名": "name",
  "住所": "address",
  "電話番号": "tel",
  "メールアドレス": "email",
  "日付": "date",
  "選択式": "single_choice",
  "短い文章": "short_text",
  "銀行名": "bank_name",
  "支店名": "branch_name",
  "口座種別": "account_type",
  "口座番号": "account_number",
};

// QUESTIONS_TEXT（人が読み書きする形式）を、画面表示用のデータに変換する
// 「入力制限：〇〇」の日本語表記 → 内部処理用のパターン名への対応表
const RESTRICTION_MAP = {
  "半角数字のみ": "digits",
  "半角英数字のみ": "alnum_hw",
  "全角文字のみ": "fullwidth",
};

function parseQuestionsText(text){
  const blocks = text
    .split(/^===\s*$/m)
    .map(b => b.trim())
    .filter(b => b.length > 0);

  return blocks.map((block, i) => {
    const q = {
      id: "q" + (i + 1),
      label: "",
      description: "",
      type: "short_text",
      required: false,
      validation: null,
      options: [],
    };

    block.split("\n").forEach(rawLine => {
      const line = rawLine.trim();
      if (!line) return;
      const sep = line.includes("：") ? "：" : (line.includes(":") ? ":" : null);
      if (!sep) return;
      const sepIndex = line.indexOf(sep);
      const key = line.slice(0, sepIndex).trim();
      const value = line.slice(sepIndex + 1).trim();

      if (key === "質問文") q.label = value;
      else if (key === "説明文") q.description = value;
      else if (key === "種類") q.type = TYPE_MAP[value] || "short_text";
      else if (key === "必須") q.required = (value === "はい");
      else if (key === "文字数上限") q.maxLength = parseInt(value, 10) || null;
      else if (key === "入力制限") q.restriction = RESTRICTION_MAP[value] || null;
      else if (key.startsWith("選択肢")) q.options.push(value);
    });

    if (q.type === "email") q.pattern = "email";
    else if (q.type === "tel") q.pattern = "phone";
    else if (q.type === "account_number"){
      q.pattern = "digits";
      q.exactLength = 7; // 日本の銀行口座番号は半角数字7桁が標準の仕様
    } else if (q.type === "short_text" && q.restriction){
      q.pattern = q.restriction; // 「短い文章」は入力制限で文字種を指定できる
    }

    if (q.type === "account_type"){
      if (q.options.length === 0) q.options = ["普通", "当座"];
      q.type = "single_choice"; // 見た目・動作は選択式と共通
    }

    return q;
  });
}

const QUESTIONS = parseQuestionsText(QUESTIONS_TEXT);


let current = 0;                 // 現在の質問インデックス
const answers = {};              // 回答を保持
let confirmScreenActive = false;

/* ---------------------------------------------------------
   GAS連携（外部ホスティング用：fetch()でGASのAPIを呼び出す）
   ----------------------------------------------------------
   ・下のURLを、デプロイ後のGASウェブアプリのURL（.../exec）に書き換えてください。
   ・書き換える前（プレースホルダーのまま）は、通信せずに動作確認できる
     モードで動きます（見た目の確認用）。
   --------------------------------------------------------- */
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyljDnteJVGfJe7TAROV0HYr_1_Z3k0oWMC_kGW4xNVlfEjxv-GJHB7BPs6nJJSNzPSRA/exec";

function createLocalMockRun(){
  const mock = {
    _success: null,
    _failure: null,
    withSuccessHandler(fn){ mock._success = fn; return mock; },
    withFailureHandler(fn){ mock._failure = fn; return mock; },
    submitForm(data){
      console.log("[ローカルモック] GAS_API_URL が未設定のため、実際の送信は行っていません:", data);
      // 実際の通信を模した遅延
      setTimeout(() => {
        if (mock._success) mock._success({ ok: true });
      }, 700);
    }
  };
  return mock;
}

function createFetchRun(){
  const run = {
    _success: null,
    _failure: null,
    withSuccessHandler(fn){ run._success = fn; return run; },
    withFailureHandler(fn){ run._failure = fn; return run; },
    async submitForm(data){
      try {
        const res = await fetch(GAS_API_URL, {
          method: "POST",
          // Content-Typeをtext/plainにすることで、ブラウザの事前確認通信(プリフライト)を回避している
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(data),
        });
        if (!res.ok){
          throw new Error("サーバーとの通信に失敗しました（status: " + res.status + "）");
        }
        const result = await res.json();
        if (result && result.ok){
          if (run._success) run._success(result);
        } else {
          if (run._failure) run._failure({ message: (result && result.message) || "送信に失敗しました。" });
        }
      } catch (err) {
        if (run._failure){
          run._failure({ message: "通信に失敗しました。インターネット接続をご確認のうえ、時間をおいて再度お試しください。" });
        }
      }
    }
  };
  return run;
}

const gasRun = GAS_API_URL.startsWith("http")
  ? createFetchRun()
  : createLocalMockRun();

const stage = document.getElementById("stage");

/* ---------------------------------------------------------
   銀行名・支店名の入力補助（オートコンプリート）
   ----------------------------------------------------------
   ・日本国内の金融機関データを無料公開している「銀行くん」
     （bank.teraren.com）というサービスの「検索API」を使用。
     入力のたびに、その時点の入力内容でサーバーに検索をお願いする方式
     （0.25秒入力が止まってから問い合わせるため、1文字ごとには送らない）。
   ・同じ検索語には結果をキャッシュし、同じ問い合わせを繰り返さないようにする。
   --------------------------------------------------------- */
const bankSearchCache = {};   // 検索語ごとの銀行検索結果キャッシュ
const branchSearchCache = {}; // "銀行コード:検索語" ごとの支店検索結果キャッシュ
const selectedBankCode = {};  // 質問IDごとに「候補から選ばれた銀行のコード」を記録

function fetchBankSuggestions(query){
  const q = query.trim();
  if (!q) return Promise.resolve([]);
  if (bankSearchCache[q]) return Promise.resolve(bankSearchCache[q]);

  return fetch(`https://bank.teraren.com/banks/search.json?name=${encodeURIComponent(q)}`)
    .then(res => {
      if (!res.ok) throw new Error("bank search failed");
      return res.json();
    })
    .then(list => {
      const results = Array.isArray(list) ? list.slice(0, 8) : [];
      bankSearchCache[q] = results;
      return results;
    })
    .catch(err => {
      console.warn("銀行データの検索に失敗しました:", err);
      return [];
    });
}

function fetchBranchSuggestions(bankCode, query){
  const q = query.trim();
  if (!q) return Promise.resolve([]);
  const cacheKey = bankCode + ":" + q;
  if (branchSearchCache[cacheKey]) return Promise.resolve(branchSearchCache[cacheKey]);

  return fetch(`https://bank.teraren.com/banks/${bankCode}/branches/search.json?name=${encodeURIComponent(q)}`)
    .then(res => {
      if (!res.ok) throw new Error("branch search failed");
      return res.json();
    })
    .then(list => {
      const results = Array.isArray(list) ? list.slice(0, 8) : [];
      branchSearchCache[cacheKey] = results;
      return results;
    })
    .catch(err => {
      console.warn("支店データの検索に失敗しました:", err);
      return [];
    });
}

// 「支店名」の質問より前にある、直近の「銀行名」質問を探す
function findPrecedingBankQuestion(index){
  for (let i = index - 1; i >= 0; i--){
    if (QUESTIONS[i].type === "bank_name") return QUESTIONS[i];
  }
  return null;
}

function validate(q, rawValue){
  const value = (rawValue ?? "").trim();

  if (q.required && value === ""){
    return "この項目は必須です。";
  }
  if (value === ""){
    return null; // 任意項目で未入力ならOK
  }
  if (q.pattern === "email"){
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!re.test(value)) return "メールアドレスの形式で入力してください。";
  }
  if (q.pattern === "phone"){
    const re = /^[0-9]+$/;
    if (!re.test(value)) return "半角数字のみで入力してください（ハイフンは使えません）。";
  }
  if (q.pattern === "digits"){
    const re = /^[0-9]+$/;
    if (!re.test(value)) return "半角数字のみで入力してください。";
  }
  if (q.pattern === "alnum_hw"){
    const re = /^[A-Za-z0-9]+$/;
    if (!re.test(value)) return "半角英数字のみで入力してください。";
  }
  if (q.pattern === "fullwidth"){
    // 半角英数字・半角記号・半角カタカナ以外（全角文字）だけを許可する簡易チェック
    const re = /^[^\x01-\x7E\uFF61-\uFF9F]+$/;
    if (!re.test(value)) return "全角文字のみで入力してください。";
  }
  if (q.exactLength){
    if (value.length !== q.exactLength){
      return `半角数字${q.exactLength}桁で入力してください（${q.exactLength}桁に満たない場合は先頭に0を補ってください）。`;
    }
  }
  if (q.maxLength){
    if (value.length > q.maxLength){
      return `${q.maxLength}文字以内で入力してください。`;
    }
  }
  return null;
}

function renderIntroScreen(){
  const introHtml = FORM_SETTINGS.introText
    ? FORM_SETTINGS.introText.split("<br>").map(escapeHtml).join("<br>")
    : "";

  const html = `
    <div class="screen active" id="screen-intro">
      <div class="q-body">
        <p class="q-desc" style="font-size:15px; line-height:1.9; margin-top:0;">${introHtml}</p>
      </div>
      <div class="footer">
        <button class="btn btn-primary" id="btnAgree">${escapeHtml(FORM_SETTINGS.agreeButtonLabel)}</button>
      </div>
    </div>
  `;
  stage.innerHTML = html;

  document.getElementById("btnAgree").addEventListener("click", () => {
    current = 0;
    renderQuestionScreen(current);
  });
}

function renderQuestionScreen(index){
  const q = QUESTIONS[index];
  const savedValue = answers[q.id] ?? "";

  const badge = q.required
    ? '<span class="q-required">必須</span>'
    : '<span class="q-optional">任意</span>';

  let bodyHtml = "";
  if (q.type === "single_choice"){
    bodyHtml = `<div class="options">` + q.options.map((opt, i) => `
      <label class="option ${savedValue === opt ? "selected" : ""}" data-value="${escapeHtml(opt)}">
        <input type="radio" name="opt" ${savedValue === opt ? "checked" : ""}>
        <span class="dot"></span>
        <span class="option-text">${escapeHtml(opt)}</span>
      </label>
    `).join("") + `</div>`;
  } else if (q.type === "bank_name"){
    bodyHtml = `
      <input type="text" id="answerInput" value="${escapeHtml(savedValue)}" placeholder="銀行名の一部を入力（例：三菱）" autocomplete="off">
      <div class="bank-suggestions" id="bankSuggestions" style="display:none;"></div>
    `;
  } else if (q.type === "branch_name"){
    const bankQ = findPrecedingBankQuestion(index);
    const linkedBankCode = bankQ ? selectedBankCode[bankQ.id] : null;
    const hintHtml = !bankQ
      ? `<p class="bank-link-hint">この質問より前に「銀行名」の質問が無いため、候補なしで自由に入力できます。</p>`
      : !linkedBankCode
        ? `<p class="bank-link-hint">先に「${escapeHtml(bankQ.label)}」で候補から金融機関を選択すると、支店の候補が表示されます。</p>`
        : "";
    bodyHtml = `
      <input type="text" id="answerInput" value="${escapeHtml(savedValue)}" placeholder="支店名の一部を入力（例：東京）" autocomplete="off">
      <div class="bank-suggestions" id="bankSuggestions" style="display:none;"></div>
      ${hintHtml}
    `;
  } else if (q.type === "address"){
    const savedZip = answers[q.id + "_zip"] ?? "";
    const savedAddr = answers[q.id + "_addr"] ?? "";
    bodyHtml = `
      <label class="address-sublabel" for="zipInput">郵便番号</label>
      <input type="tel" id="zipInput" value="${escapeHtml(savedZip)}" placeholder="例：123-4567" maxlength="8" autocomplete="off">
      <div class="error-msg" id="zipErrorMsg"></div>
      <label class="address-sublabel address-sublabel-second" for="addressInput">住所</label>
      <input type="text" id="addressInput" value="${escapeHtml(savedAddr)}" placeholder="郵便番号を入力すると自動入力されます" autocomplete="off">
    `;
  } else {
    const inputType = q.type === "email" ? "email" : (q.type === "tel" || q.type === "account_number") ? "tel" : "text";
    const placeholderMap = {
      name: "例：山田 太郎",
      tel: "例：09012345678（ハイフンなし）",
      email: "例：sample@example.com",
      date: "例：2026-08-01",
      account_number: "例：0123456（半角数字7桁）",
    };
    const placeholder = placeholderMap[q.type] || (
      q.pattern === "digits" ? "半角数字のみで入力してください" :
      q.pattern === "alnum_hw" ? "半角英数字のみで入力してください" :
      q.pattern === "fullwidth" ? "全角文字のみで入力してください" :
      "入力してください"
    );
    bodyHtml = `<input type="${inputType}" id="answerInput" value="${escapeHtml(savedValue)}" placeholder="${escapeHtml(placeholder)}">`;
  }

  const html = `
    <div class="screen active" id="screen-q">
      <div class="q-body">
        <h2 class="q-label">${escapeHtml(q.label)}${badge}</h2>
        ${bodyHtml}
        <p class="q-desc">${escapeHtml(q.description)}</p>
        <div class="error-msg" id="errorMsg"></div>
      </div>
      <div class="footer">
        <button class="btn btn-secondary" id="btnBack">戻る</button>
        <button class="btn btn-primary" id="btnNext">${index === QUESTIONS.length - 1 ? "確認画面へ" : "次へ"}</button>
      </div>
    </div>
  `;
  stage.innerHTML = html;

  // 選択肢のクリック処理
  if (q.type === "single_choice"){
    stage.querySelectorAll(".option").forEach(el => {
      el.addEventListener("click", () => {
        stage.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
        el.classList.add("selected");
        answers[q.id] = el.dataset.value;
        document.getElementById("errorMsg").textContent = "";
      });
    });
  } else if (q.type === "bank_name"){
    const input = document.getElementById("answerInput");
    const suggestionsEl = document.getElementById("bankSuggestions");
    let debounceTimer = null;

    input.addEventListener("input", () => {
      answers[q.id] = input.value;
      selectedBankCode[q.id] = null; // 手入力で変更されたら、それまでの選択は無効にする
      document.getElementById("errorMsg").textContent = "";
      input.classList.remove("error");

      clearTimeout(debounceTimer);
      const query = input.value;
      if (!query.trim()){
        suggestionsEl.style.display = "none";
        suggestionsEl.innerHTML = "";
        return;
      }
      debounceTimer = setTimeout(() => {
        fetchBankSuggestions(query).then(matches => {
          if (matches.length === 0){
            suggestionsEl.style.display = "none";
            suggestionsEl.innerHTML = "";
            return;
          }
          suggestionsEl.innerHTML = matches.map(bank => {
            const displayName = (bank.normalize && bank.normalize.name) || bank.name;
            return `<div class="bank-suggestion-item" data-name="${escapeHtml(displayName)}" data-code="${escapeHtml(bank.code)}">
              <span class="bank-suggestion-name">${escapeHtml(displayName)}</span>
              <span class="bank-suggestion-code">${escapeHtml(bank.code)}</span>
            </div>`;
          }).join("");
          suggestionsEl.style.display = "block";

          suggestionsEl.querySelectorAll(".bank-suggestion-item").forEach(item => {
            item.addEventListener("click", () => {
              input.value = item.dataset.name;
              answers[q.id] = item.dataset.name;
              selectedBankCode[q.id] = item.dataset.code; // 後続の「支店名」質問から参照される
              suggestionsEl.style.display = "none";
              suggestionsEl.innerHTML = "";
            });
          });
        });
      }, 250); // 連続入力中は毎回問い合わせず、入力が止まってから検索する
    });

    setTimeout(() => input.focus(), 50);

  } else if (q.type === "branch_name"){
    const input = document.getElementById("answerInput");
    const suggestionsEl = document.getElementById("bankSuggestions");
    const bankQ = findPrecedingBankQuestion(index);
    const linkedBankCode = bankQ ? selectedBankCode[bankQ.id] : null;
    let debounceTimer = null;

    input.addEventListener("input", () => {
      answers[q.id] = input.value;
      document.getElementById("errorMsg").textContent = "";
      input.classList.remove("error");

      clearTimeout(debounceTimer);
      const query = input.value;
      if (!query.trim() || !linkedBankCode){
        suggestionsEl.style.display = "none";
        suggestionsEl.innerHTML = "";
        return;
      }
      debounceTimer = setTimeout(() => {
        fetchBranchSuggestions(linkedBankCode, query).then(matches => {
          if (matches.length === 0){
            suggestionsEl.style.display = "none";
            suggestionsEl.innerHTML = "";
            return;
          }
          suggestionsEl.innerHTML = matches.map(branch => {
            const displayName = (branch.normalize && branch.normalize.name) || branch.name;
            return `<div class="bank-suggestion-item" data-name="${escapeHtml(displayName)}">
              <span class="bank-suggestion-name">${escapeHtml(displayName)}</span>
              <span class="bank-suggestion-code">${escapeHtml(branch.code)}</span>
            </div>`;
          }).join("");
          suggestionsEl.style.display = "block";

          suggestionsEl.querySelectorAll(".bank-suggestion-item").forEach(item => {
            item.addEventListener("click", () => {
              input.value = item.dataset.name;
              answers[q.id] = item.dataset.name;
              suggestionsEl.style.display = "none";
              suggestionsEl.innerHTML = "";
            });
          });
        });
      }, 250);
    });

    setTimeout(() => input.focus(), 50);

  } else if (q.type === "address"){
    const zipInput = document.getElementById("zipInput");
    const addressInput = document.getElementById("addressInput");
    const zipErrorEl = document.getElementById("zipErrorMsg");
    let debounceTimer = null;

    // 確認画面などで使う「〒123-4567 東京都...」形式の1本の文字列にまとめて保存する
    function syncCombinedAnswer(){
      const zip = zipInput.value.trim();
      const addr = addressInput.value.trim();
      answers[q.id + "_zip"] = zip;
      answers[q.id + "_addr"] = addr;
      answers[q.id] = zip ? `〒${zip} ${addr}`.trim() : addr;
    }

    zipInput.addEventListener("input", () => {
      syncCombinedAnswer();
      document.getElementById("errorMsg").textContent = "";
      zipErrorEl.textContent = "";
      zipInput.classList.remove("error");

      clearTimeout(debounceTimer);
      const digitsOnly = zipInput.value.replace(/[^0-9]/g, "");
      if (digitsOnly.length !== 7) return;

      debounceTimer = setTimeout(() => {
        fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${digitsOnly}`)
          .then(res => {
            if (!res.ok) throw new Error("zip lookup failed");
            return res.json();
          })
          .then(data => {
            if (data.status !== 200 || !data.results || data.results.length === 0){
              zipErrorEl.textContent = "この郵便番号に該当する住所が見つかりませんでした。住所欄に直接ご入力ください。";
              return;
            }
            const r = data.results[0];
            addressInput.value = `${r.address1}${r.address2}${r.address3}`;
            syncCombinedAnswer();
            addressInput.focus();
            // カーソルを末尾に移動し、続けて番地・建物名を入力できるようにする
            const len = addressInput.value.length;
            addressInput.setSelectionRange(len, len);
          })
          .catch(err => {
            console.warn("郵便番号検索に失敗しました:", err);
            zipErrorEl.textContent = "住所の自動取得に失敗しました。住所欄に直接ご入力ください。";
          });
      }, 300);
    });

    addressInput.addEventListener("input", () => {
      syncCombinedAnswer();
      document.getElementById("errorMsg").textContent = "";
      addressInput.classList.remove("error");
    });

    setTimeout(() => zipInput.focus(), 50);

  } else {
    const input = document.getElementById("answerInput");
    input.addEventListener("input", () => {
      answers[q.id] = input.value;
    });
    // 最初の質問以外はフォーカスしない（スクロール位置ジャンプ防止のため軽めに）
    setTimeout(() => input.focus(), 50);
  }

  document.getElementById("btnBack").addEventListener("click", () => {
    if (index === 0){
      renderIntroScreen();
      return;
    }
    current -= 1;
    renderQuestionScreen(current);
  });

  document.getElementById("btnNext").addEventListener("click", () => {
    const q = QUESTIONS[index];

    if (q.type === "address"){
      const zip = document.getElementById("zipInput").value.trim();
      const addr = document.getElementById("addressInput").value.trim();
      const zipDigits = zip.replace(/[^0-9]/g, "");
      const zipErrorEl = document.getElementById("zipErrorMsg");
      const errorEl = document.getElementById("errorMsg");
      zipErrorEl.textContent = "";
      errorEl.textContent = "";

      if (q.required && !zip){
        zipErrorEl.textContent = "郵便番号は必須です。";
        return;
      }
      if (zip && zipDigits.length !== 7){
        zipErrorEl.textContent = "郵便番号は半角数字7桁で入力してください。";
        return;
      }
      if (q.required && !addr){
        errorEl.textContent = "住所は必須です。";
        return;
      }

      answers[q.id + "_zip"] = zip;
      answers[q.id + "_addr"] = addr;
      answers[q.id] = zip ? `〒${zip} ${addr}`.trim() : addr;

      if (index === QUESTIONS.length - 1){
        renderConfirmScreen();
      } else {
        current += 1;
        renderQuestionScreen(current);
      }
      return;
    }

    const value = q.type === "single_choice" ? (answers[q.id] ?? "") : (document.getElementById("answerInput").value ?? "");
    const errorText = validate(q, value);
    const errorEl = document.getElementById("errorMsg");

    if (errorText){
      errorEl.textContent = errorText;
      const inputEl = document.getElementById("answerInput");
      if (inputEl) inputEl.classList.add("error");
      return;
    }
    answers[q.id] = value.trim ? value.trim() : value;

    if (index === QUESTIONS.length - 1){
      renderConfirmScreen();
    } else {
      current += 1;
      renderQuestionScreen(current);
    }
  });
}

function renderConfirmScreen(){
  const itemsHtml = QUESTIONS.map((q, i) => {
    const val = answers[q.id];
    const displayVal = (val === undefined || val === "") ? "（未入力）" : val;
    const emptyClass = (val === undefined || val === "") ? "empty" : "";
    return `
      <div class="confirm-item">
        <div class="confirm-item-main">
          <div class="confirm-item-label">${escapeHtml(q.label)}</div>
          <div class="confirm-item-value ${emptyClass}">${escapeHtml(displayVal)}</div>
        </div>
        <button class="confirm-edit" data-index="${i}">編集</button>
      </div>
    `;
  }).join("");

  const html = `
    <div class="screen active" id="screen-confirm">
      <div class="q-body">
        <h2 class="confirm-title">入力内容の確認</h2>
        <p class="confirm-desc">内容をご確認のうえ、送信してください。修正する場合は各項目の「編集」を押してください。</p>
        <div class="confirm-list">${itemsHtml}</div>
        <div class="error-msg" id="submitError"></div>
      </div>
      <div class="footer">
        <button class="btn btn-secondary" id="btnConfirmBack">戻る</button>
        <button class="btn btn-primary" id="btnSubmit">送信する</button>
      </div>
    </div>
  `;
  stage.innerHTML = html;

  stage.querySelectorAll(".confirm-edit").forEach(btn => {
    btn.addEventListener("click", () => {
      current = parseInt(btn.dataset.index, 10);
      renderQuestionScreen(current);
    });
  });

  document.getElementById("btnConfirmBack").addEventListener("click", () => {
    current = QUESTIONS.length - 1;
    renderQuestionScreen(current);
  });

  document.getElementById("btnSubmit").addEventListener("click", () => {
    const btnSubmit = document.getElementById("btnSubmit");
    const btnBack = document.getElementById("btnConfirmBack");
    const errorEl = document.getElementById("submitError");

    errorEl.textContent = "";
    btnSubmit.disabled = true;
    btnBack.disabled = true;
    btnSubmit.textContent = "送信中…";

    const items = QUESTIONS.map(q => ({
      label: q.label,
      value: answers[q.id] ?? ""
    }));

    gasRun
      .withSuccessHandler(() => {
        renderThanksScreen();
      })
      .withFailureHandler((error) => {
        btnSubmit.disabled = false;
        btnBack.disabled = false;
        btnSubmit.textContent = "送信する";
        errorEl.textContent = (error && error.message)
          ? error.message
          : "送信に失敗しました。時間をおいて再度お試しください。";
      })
      .submitForm({ items });
  });
}

function renderThanksScreen(){
  const hasRedirect = !!FORM_SETTINGS.redirectUrl;

  const countdownHtml = hasRedirect
    ? `<p class="close-hint" id="redirectHint">5秒後に自動的に移動します…</p>`
    : "";

  const html = `
    <div class="screen active thanks-screen" id="screen-thanks">
      <div class="thanks-body">
        <div class="thanks-mark">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 12.5L9.5 18L20 6" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2 class="thanks-title">${escapeHtml(FORM_SETTINGS.thanksTitle)}</h2>
        <p class="thanks-desc">${FORM_SETTINGS.thanksDesc.replaceAll("<br>", "\n").split("\n").map(escapeHtml).join("<br>")}</p>
        ${countdownHtml}
      </div>
      <div class="footer">
        <button class="btn btn-primary" id="btnClose">${escapeHtml(FORM_SETTINGS.closeButtonLabel)}</button>
      </div>
    </div>
  `;
  stage.innerHTML = html;

  if (hasRedirect){
    // 「完了」ボタンを押したら即座に移動
    document.getElementById("btnClose").addEventListener("click", () => {
      window.location.href = FORM_SETTINGS.redirectUrl;
    });

    // 5秒間操作がなければ自動的に移動（1秒ごとにカウントダウン表示を更新）
    let remaining = 5;
    const hintEl = document.getElementById("redirectHint");
    const timer = setInterval(() => {
      remaining -= 1;
      if (remaining <= 0){
        clearInterval(timer);
        window.location.href = FORM_SETTINGS.redirectUrl;
        return;
      }
      if (hintEl) hintEl.textContent = remaining + "秒後に自動的に移動します…";
    }, 1000);
  }
  // 移動先URLが未設定の場合、「完了」ボタンは表示されるがクリックしても何も起きない
  // （押しても画面はその場に留まる）
}


function escapeHtml(str){
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

renderIntroScreen();
</script>

</html>
